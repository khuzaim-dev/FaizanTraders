<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netlify Forms</title>
</head>
<body>
    <!-- This hidden form is required by Netlify to register the form fields since Next.js App Router doesn't export static HTML in the way Netlify expects -->
    <form name="contact" data-netlify="true" hidden>
        <input type="text" name="name" />
        <input type="text" name="phone" />
        <textarea name="requirements"></textarea>
    </form>
</body>
</html>
